<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Skystore{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'catalog/css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="d-flex flex-column flex-md-row align-items-center justify-content-between">
                <h5 class="my-0 mr-md-auto font-weight-normal">Skystore</h5>
                <nav class="my-2 my-md-0 mr-md-3">
                    <a class="btn btn-outline-light me-2" href="{% url 'home' %}">Каталог</a>
                    <a class="btn btn-outline-light" href="{% url 'contacts' %}">Контакты</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="row">
                <div class="col-12 col-md">
                    <h5>SkyStore</h5>
                    <small class="d-block mb-3 text-muted">&copy; 2023</small>
                </div>
                <div class="col-6 col-md">
                    <h5>Категории</h5>
                    <ul class="list-unstyled text-small">
                        <li><a href="#">Рассылки</a></li>
                        <li><a href="#">Телеграм боты</a></li>
                        <li><a href="#">Полезные утилиты</a></li>
                        <li><a href="#">Веб-приложения</a></li>
                        <li><a href="#">Микросервисы</a></li>
                    </ul>
                </div>
                <div class="col-6 col-md">
                    <h5>Дополнительно</h5>
                    <ul class="list-unstyled text-small">
                        <li><a href="#">Мы пишем</a></li>
                    </ul>
                </div>
                <div class="col-6 col-md">
                    <h5>О нас</h5>
                    <ul class="list-unstyled text-small">
                        <li><a href="{% url 'contacts' %}">Контакты</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
